name: Regression tests
on:
    schedule:
        - cron: '0 1 * * 1,2'
    workflow_dispatch:
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '24'
                cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run the tests
              run: npx playwright test --grep @regression
